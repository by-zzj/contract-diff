appId: com.contract-diff.app
productName: 合同比对工具
copyright: Copyright © 2026

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*

extraResources:
  - from: "backend/"
    to: "backend/"
    filter:
      - "**/*"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/build/**"
      - "!**/dist/**"
      - "!**/dist_pp/**"

win:
  target:
    - target: portable
      arch: [x64]
  icon: resources/icons/icon.ico
  signAndEditExecutable: false

mac:
  target: []
  icon: resources/icons/icon.icns

linux:
  target: []
  icon: resources/icons
